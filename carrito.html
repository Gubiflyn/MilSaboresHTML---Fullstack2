<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito | Mil Sabores</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <header>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top">
      <div class="container">
        <a class="navbar-brand brand" href="index.html"><img src="assets/img/icono.png" alt="Logo Mil Sabores"><span>Mil Sabores</span></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal" aria-label="Abrir menú"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="menuPrincipal">
          <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
            <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
            <li class="nav-item"><a class="nav-link" href="productos.html">Productos</a></li>
            <li class="nav-item"><a class="nav-link" href="contacto.html">Contacto</a></li>
            <li class="nav-item"><a class="nav-link" href="login.html">Ingresar</a></li>
            <li class="nav-item"><a class="btn btn-brand btn-sm" href="carrito.html">Carrito <span class="cart-count" data-cart-count>0</span></a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main class="page-main">
    <section class="page-header">
      <div class="container">
        <p class="eyebrow">Compra</p>
        <h1>Carrito de compras</h1>
        <p>Revisa los productos seleccionados antes de finalizar tu pedido.</p>
      </div>
    </section>

    <section class="section-padding">
      <div class="container">
        <div class="row g-4">
          <div class="col-lg-8">
            <div id="carritoContenido" class="cart-panel"></div>
          </div>
          <div class="col-lg-4">
            <aside class="summary-card">
              <h2>Resumen</h2>
              <div class="summary-row">
                <span>Subtotal</span>
                <strong id="subtotalCarrito">$0</strong>
              </div>
              <div class="summary-row">
                <span>Despacho</span>
                <strong>Por confirmar</strong>
              </div>
              <hr>
              <div class="summary-row total">
                <span>Total</span>
                <strong id="totalCarrito">$0</strong>
              </div>
              <button id="btnFinalizarCompra" class="btn btn-brand w-100 mt-3">Finalizar compra</button>
              <button id="btnVaciarCarrito" class="btn btn-outline-brand w-100 mt-2">Vaciar carrito</button>
            </aside>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container text-center">
      <h2>Mil Sabores</h2>
      <p class="mb-0">© 2026 Mil Sabores.</p>
    </div>
  </footer>

  <script src="assets/js/carrito.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
