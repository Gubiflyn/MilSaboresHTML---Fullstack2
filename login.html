<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión | Mil Sabores</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <header>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top">
      <div class="container">
        <a class="navbar-brand brand" href="index.html"><img src="assets/img/icono.png" alt="Logo Mil Sabores"><span>Mil Sabores</span></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal" aria-label="Abrir menú"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="menuPrincipal">
          <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
            <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
            <li class="nav-item"><a class="nav-link" href="productos.html">Productos</a></li>
            <li class="nav-item"><a class="nav-link" href="contacto.html">Contacto</a></li>
            <li class="nav-item"><a class="nav-link active" href="login.html">Ingresar</a></li>
            <li class="nav-item"><a class="btn btn-brand btn-sm" href="carrito.html">Carrito <span class="cart-count" data-cart-count>0</span></a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main class="auth-main">
    <section class="auth-card">
      <p class="eyebrow">Bienvenido</p>
      <h1>Iniciar sesión</h1>
      <p>Ingresa con tu cuenta para continuar en Mil Sabores.</p>

      <form id="loginForm">
        <div class="mb-3">
          <label for="loginEmail" class="form-label">Correo electrónico</label>
          <input type="email" id="loginEmail" class="form-control" required>
        </div>
        <div class="mb-3">
          <label for="loginPassword" class="form-label">Contraseña</label>
          <input type="password" id="loginPassword" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-brand w-100">Ingresar</button>
        <p id="loginMensaje" class="form-message"></p>
      </form>

      <p class="auth-link">¿No tienes cuenta? <a href="register.html">Crear cuenta</a></p>
      <p class="demo-user">Usuario de prueba: cliente@milsabores.cl / 123456</p>
    </section>
  </main>

  <script src="assets/js/carrito.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
